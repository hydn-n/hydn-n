name: Metrics

on:
  # Rebuild the metrics image every day at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab (only once on the default branch)
  workflow_dispatch:
  # Refresh and commit the image on pushes to the default branch
  push:
    branches: ["main"]
  # Render a preview (uploaded as an artifact, not committed) for pull requests
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # A personal access token must be stored as the GH_TOKEN secret.
          # Create one at https://github.com/settings/tokens with the
          # `repo` and `read:user` scopes, then add it under
          # Settings > Secrets and variables > Actions.
          token: ${{ secrets.GH_TOKEN }}
          user: hydn-n
          filename: github-metrics.svg

          # Always render without committing - we use create-pull-request
          # on non-PR events to satisfy branch protection rules.
          output_action: none

          # Layout
          template: classic
          base: header, metadata
          config_timezone: America/Toronto

          # Recent commit activity as an isometric calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Most used languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: jupyter notebook, html, css

      - name: Copy rendered SVG into workspace
        run: sudo cp /metrics_renders/github-metrics.svg ./github-metrics.svg

      - name: Create or update metrics PR
        # On non-PR events, open a PR to update the SVG (bypasses branch protection)
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "chore: update github-metrics.svg [skip ci]"
          branch: auto/update-metrics
          title: "chore: update github-metrics.svg"
          body: "Automated metrics SVG refresh."
          delete-branch: true

      - name: Upload preview artifact
        # Only on PRs - download from the run Artifacts section to preview.
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: github-metrics-preview
          path: github-metrics.svg
          if-no-files-found: error

  stats-30d:
    runs-on: ubuntu-latest
    # Only run on non-PR events (schedule, dispatch, push to main)
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch 30-day commit and PR counts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          SINCE=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)

          COMMITS=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/commits?q=author:hydn-n+committer-date:>$SINCE&per_page=1" \
            | jq '.total_count')

          PRS=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/issues?q=type:pr+author:hydn-n+created:>$SINCE&per_page=1" \
            | jq '.total_count')

          echo "{\"commits_30d\": $COMMITS, \"prs_30d\": $PRS}" > github-30d-stats.json
          cat github-30d-stats.json

      - name: Create or update stats PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "chore: update 30-day stats [skip ci]"
          branch: auto/update-30d-stats
          title: "chore: update 30-day stats"
          body: "Automated 30-day activity stats refresh."
          delete-branch: true
